@if (missingDefinitions().length) {
  <div>
    <fieldset>
      <legend>
        <mat-icon class="mat-warn">warning</mat-icon>&nbsp; Missing Parts
      </legend>
      <table>
        <tbody>
          @for (
            def of missingDefinitions();
            track def.typeId + ":" + (def.roleId ?? "")
          ) {
            <tr>
              <td>
                <button
                  type="button"
                  mat-icon-button
                  matTooltip="Add this part"
                  (click)="requestAddPart(def)"
                >
                  <mat-icon>add_circle</mat-icon>
                </button>
              </td>
              <td [matTooltip]="def.description">
                <cadmus-part-badge
                  [partTypeIds]="def"
                  [facetDefinition]="facetDefinition()"
                  [typeThesaurus]="typeThesaurus()"
                />
              </td>
            </tr>
          }
        </tbody>
      </table>
    </fieldset>
  </div>
}
